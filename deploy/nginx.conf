# ============================================================
# NusaLingua Nginx Config — Production Ready
# ============================================================
# Path: /etc/nginx/sites-available/nusalingua
# Symlink: /etc/nginx/sites-enabled/nusalingua
#
# Ganti placeholder:
#   YOUR_DOMAIN.COM  → domain Anda (mis. nusalingua.id)
#   /var/www/nusalingua  → path build client
#
# Setelah SSL certbot:
#   sudo certbot --nginx -d nusalingua.id -d www.nusalingua.id
# certbot otomatis tambah blok HTTPS + redirect HTTP→HTTPS.
# ============================================================

# Rate limit untuk API (tahan flood)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Connection header: "upgrade" hanya saat client minta WebSocket upgrade,
# kosong untuk request biasa — supaya keepalive ke upstream tetap jalan.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      "";
}

# Upstream Node server (Express + SSE)
upstream nusalingua_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM www.YOUR_DOMAIN.COM;

    # ACME challenge untuk Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect ke HTTPS setelah SSL aktif (certbot akan auto-add)
    # location / { return 301 https://$host$request_uri; }

    # Sementara serve langsung sebelum SSL diaktifkan
    root /var/www/nusalingua;
    index index.html;

    # ============ STATIC ASSETS (React build) ============
    location / {
        try_files $uri $uri/ /index.html;

        # Cache hashed assets (Vite bikin hash di filename)
        location ~* \.(js|css|woff2|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html jangan di-cache (supaya update terdeploy langsung)
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ============ API ROUTES ============
    location /api/ {
        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://nusalingua_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade untuk WebSocket (kalau dipakai nanti).
        # Pakai map $connection_upgrade — JANGAN hardcode "upgrade",
        # karena itu mematikan keepalive upstream untuk request biasa.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # PENTING: SSE streaming butuh ini
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Pass through CORS dari Express (jangan duplikasi headers)
        proxy_pass_header Set-Cookie;
    }

    # ============ Stricter rate limit untuk auth/voice endpoints ============
    location ~ ^/api/(voice/session|auth) {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://nusalingua_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ============ SECURITY HEADERS ============
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # CSP — sesuaikan domain Supabase + OpenAI
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.openai.com https://*.openai.com; media-src 'self' blob:; frame-ancestors 'self';" always;

    # ============ COMPRESSION ============
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss application/atom+xml image/svg+xml;

    # Logs
    access_log /var/log/nginx/nusalingua.access.log;
    error_log /var/log/nginx/nusalingua.error.log warn;

    # Body size (untuk file upload kalau ada nanti)
    client_max_body_size 10M;
}
